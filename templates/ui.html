<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EEG Car Racing Controls Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e24;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Side: Car Racing Track Layout */
        #track-container {
            width: 40%;
            background: #333;
            border-right: 5px dashed #ffd700;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .lane-line {
            position: absolute;
            width: 4px;
            height: 100%;
            background: repeating-linear-gradient(to bottom, #fff, #fff 30px, transparent 30px, transparent 60px);
        }

        #car {
            position: absolute;
            bottom: 50px;
            width: 50px;
            height: 90px;
            background: #ff3333;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.8);
            transition: bottom 0.5s ease-out, background-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }
        #car::before {
            content: '🏎️';
            font-size: 30px;
        }

        /* Right Side: Configuration Control Panel */
        #control-panel {
            width: 60%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background: #282830;
        }

        h2 { color: #00ffcc; border-bottom: 2px solid #444; padding-bottom: 10px; }

        .btn-group { display: flex; gap: 20px; margin: 20px 0; }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
        }

        .btn-hardware { background: #e67e22; }
        .btn-hardware:hover { background: #d35400; box-shadow: 0 0 10px rgba(230,126,34,0.5); }

        .btn-simulation { background: #3498db; }
        .btn-simulation:hover { background: #2980b9; box-shadow: 0 0 10px rgba(52,152,219,0.5); }

        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        #metrics-display {
            margin-top: 30px;
            background: #1a1a1f;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #00ffcc;
        }

        .metric { font-size: 18px; margin: 10px 0; }
        .highlight { font-weight: bold; color: #ffd700; }
    </style>
</head>
<body>

    <div id="track-container">
        <div class="lane-line"></div>
        <div id="car"></div>
    </div>

    <div id="control-panel">
        <h2>EEG Focus Engine Racing Interface</h2>
        <p>Select your data pipeline ingestion configuration protocol below to initialize tracking:</p>
        
        <div class="btn-group">
            <button class="btn-hardware" id="btn-hw" onclick="startStream('serial')">(a) Testing Using Hardware</button>
            <button class="btn-simulation" id="btn-sim" onclick="startStream('file')">(b) Run Live Simulation File</button>
        </div>

        <div id="metrics-display">
            <h3>Live Telemetry Status</h3>
            <div class="metric">Current Mental State: <span id="lbl-state" class="highlight">Awaiting Stream...</span></div>
            <div class="metric">Car Engine Vector: <span id="lbl-action" class="highlight">Stationary</span></div>
            <div class="metric">Pipeline Raw Value: <span id="lbl-signal" class="highlight">---</span></div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentCarPosition = 50; // Starting baseline height position from bottom (pixels)
        const trackHeight = window.innerHeight;
        const carElement = document.getElementById('car');

        function startStream(modeSelection) {
            // Disable buttons during active operation
            document.getElementById('btn-hw').disabled = true;
            document.getElementById('btn-sim').disabled = true;

            document.getElementById('lbl-state').innerText = "Initializing Stream Architecture...";
            
            // Connect to your uniform socket path setup
            ws = new WebSocket(`ws://${window.location.host}/pipeline_stream`);

            ws.onopen = function() {
                console.log("WebSocket connected. Sending START command payload.");
                // Dispatch initiation JSON back across the pipe channel
                const payload = {
                    "command": "START",
                    "mode": modeSelection
                };
                ws.send(JSON.stringify(payload));
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.status === "complete") {
                    document.getElementById('lbl-state').innerText = "Stream Completed.";
                    resetControls();
                    return;
                }

                // Update text statuses in real-time
                document.getElementById('lbl-state').innerText = data.state;
                document.getElementById('lbl-action').innerText = data.action;
                document.getElementById('lbl-signal').innerText = data.signal ? data.signal.toFixed(2) : "---";

                // Map target logic to car position
                if (data.action === "ACCELERATE") {
                    // Accelerate upward, capping position at 80% track height
                    currentCarPosition = Math.min(currentCarPosition + 60, trackHeight - 150);
                    carElement.style.backgroundColor = "#00ffcc";
                    carElement.style.boxShadow = "0 0 25px rgba(0, 255, 204, 0.9)";
                } else {
                    // Rest / Slow down down to baseline position
                    currentCarPosition = Math.max(currentCarPosition - 40, 50);
                    carElement.style.backgroundColor = "#ff3333";
                    carElement.style.boxShadow = "0 0 15px rgba(255, 51, 51, 0.8)";
                }
                carElement.style.bottom = currentCarPosition + "px";
            };

            ws.onclose = function() {
                console.log("WebSocket stream pipe closed.");
                resetControls();
            };

            ws.onerror = function(err) {
                console.error("Pipeline Socket Interruption: ", err);
                resetControls();
            };
        }

        function resetControls() {
            document.getElementById('btn-hw').disabled = false;
            document.getElementById('btn-sim').disabled = false;
            document.getElementById('lbl-action').innerText = "Stationary";
            document.getElementById('lbl-state').innerText = "Awaiting Stream...";
            
            // Return car to baseline resting space safely
            currentCarPosition = 50;
            carElement.style.bottom = currentCarPosition + "px";
            carElement.style.backgroundColor = "#ff3333";
            carElement.style.boxShadow = "0 0 15px rgba(255, 51, 51, 0.8)";
        }
    </script>
</body>
</html>
