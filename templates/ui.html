<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EEG Focus Engine Racing Interface</title>
    <style>
        :root {
            --bg-base: #0c0c0e;
            --bg-surface: #16161a;
            --bg-card: #1e1e24;
            --border-glow: #2a2a35;
            --text-main: #f4f4f7;
            --text-muted: #8a8a98;
            --accent-cyan: #00ffcc;
            --accent-blue: #3b82f6;
            --accent-red: #ff3355;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Side: Circular Track & Speedometer Panel */
        #track-container {
            width: 45%;
            background: radial-gradient(circle at center, #1a1a24 0%, #0c0c0e 100%);
            border-right: 1px solid var(--border-glow);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #trackCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Right Side: Configuration Control Panel */
        #control-panel {
            width: 55%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background: var(--bg-surface);
            box-sizing: border-box;
            gap: 24px;
            overflow-y: auto;
        }

        .panel-header h2 { 
            color: var(--accent-cyan); 
            margin: 0 0 6px 0; 
            font-size: 26px; 
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .panel-header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .btn-group { display: flex; gap: 16px; margin: 5px 0; }

        button {
            flex: 1;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #fff;
        }

        .btn-hardware { 
            background: linear-gradient(135deg, #e67e22, #d35400); 
            border-color: #f39c12;
        }
        .btn-hardware:hover:not(:disabled) { 
            box-shadow: 0 0 20px rgba(230,126,34,0.4);
            transform: translateY(-1px);
        }

        .btn-simulation { 
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-color: #5dade2;
        }
        .btn-simulation:hover:not(:disabled) { 
            box-shadow: 0 0 20px rgba(52,152,219,0.4);
            transform: translateY(-1px);
        }

        button:disabled { 
            background: #24242b !important; 
            border-color: #2d2d36 !important;
            color: #555562 !important;
            cursor: not-allowed; 
            box-shadow: none !important;
            transform: none !important;
        }

        /* Clean Glassmorphic Metrics HUD Cards */
        #metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .metric-card {
            background: #1d1d24;
            border: 1px solid #2d2d38;
            padding: 16px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .metric-card .card-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .metric-card .card-value {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        /* Custom Dynamic Colored States */
        .state-attentive { color: var(--accent-cyan) !important; }
        .state-relaxed { color: var(--accent-blue) !important; }

        /* Modernized Signal Trace Window Viewport */
        .chart-window {
            flex: 1;
            background: #0c0c0e;
            border-radius: 12px;
            border: 1px solid #23232a;
            position: relative;
            min-height: 220px;
            overflow: hidden;
        }
        #chartCanvas { width: 100%; height: 100%; display: block; }
        .chart-label {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="track-container">
        <canvas id="trackCanvas"></canvas>
    </div>

    <div id="control-panel">
        <div class="panel-header">
            <h2>EEG Focus Engine Racing Interface</h2>
            <p>Select your data pipeline ingestion configuration protocol below to initialize tracking:</p>
        </div>
        
        <div class="btn-group">
            <button class="btn-hardware" id="btn-hw" onclick="startStream('serial')">Initialize Hardware Ingest</button>
            <button class="btn-simulation" id="btn-sim" onclick="startStream('file')">Run Telemetry Simulation</button>
        </div>

        <div id="metrics-grid">
            <div class="metric-card" style="border-left: 3px solid var(--accent-cyan);">
                <div class="card-title">Cognitive State</div>
                <div id="lbl-state" class="card-value">Awaiting...</div>
            </div>
            <div class="metric-card" style="border-left: 3px solid var(--accent-blue);">
                <div class="card-title">Engine Response</div>
                <div id="lbl-action" class="card-value">Stationary</div>
            </div>
            <div class="metric-card" style="border-left: 3px solid #ffd700;">
                <div class="card-title">EEG Vector Stream</div>
                <div id="lbl-signal" class="card-value">---</div>
            </div>
        </div>

        <div class="chart-window">
            <div class="chart-label">Live Raw EEG Trace (Normalized Metrics Vector)</div>
            <canvas id="chartCanvas"></canvas>
        </div>
    </div>

    <script>
        const trackCanvas = document.getElementById("trackCanvas");
        const trackCtx = trackCanvas.getContext("2d");
        const chartCanvas = document.getElementById("chartCanvas");
        const chartCtx = chartCanvas.getContext("2d");

        let ws = null;

        // --- RIGID TIME-WINDOW PHYSICS CONTROLLER ---
        let currentCarState = "RELAXED";
        let stateEndTime = 0; 
        
        let velocity = 0;
        const targetMaxSpeed = 45; // Enhanced scalar range display for speedometer output
        const targetMinSpeed = 0;
        
        // Circular Track Orbit Configuration Values
        let carAngle = 0; 

        // Car visual properties
        let carColor = varStyle('--accent-red');
        let carGlowColor = "rgba(255, 51, 85, 0.5)";

        // --- LIVE SIGNAL MEMORY WINDOW ---
        let eegBuffer = [];
        const maxDataPoints = 180;

        function varStyle(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function resizeCanvases() {
            trackCanvas.width = trackCanvas.parentElement.clientWidth;
            trackCanvas.height = trackCanvas.parentElement.clientHeight;
            chartCanvas.width = chartCanvas.parentElement.clientWidth;
            chartCanvas.height = chartCanvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        function startStream(modeSelection) {
            document.getElementById('btn-hw').disabled = true;
            document.getElementById('btn-sim').disabled = true;
            document.getElementById('lbl-state').innerText = "Initializing...";
            
            eegBuffer = [];
            stateEndTime = 0;
            currentCarState = "RELAXED";

            ws = new WebSocket(`ws://${window.location.host}/pipeline_stream`);

            ws.onopen = function() {
                ws.send(JSON.stringify({ "command": "START", "mode": modeSelection }));
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.status === "complete") {
                    document.getElementById('lbl-state').innerText = "Completed";
                    resetControls();
                    return;
                }

                // Update text metrics UI cleanly
                const stateEl = document.getElementById('lbl-state');
                stateEl.innerText = data.state;
                stateEl.className = "card-value " + (data.state === "ATTENTIVE" ? "state-attentive" : "state-relaxed");
                
                document.getElementById('lbl-action').innerText = data.action === "ACCELERATE" ? "THRUST" : "COASTING";
                document.getElementById('lbl-signal').innerText = data.signal ? Number(data.signal).toFixed(1) : "---";

                if (data.signal !== undefined) {
                    eegBuffer.push(Number(data.signal));
                    if (eegBuffer.length > maxDataPoints) eegBuffer.shift();
                }

                if (data.state) {
                    const now = performance.now();
                    if (data.state !== currentCarState) {
                        currentCarState = data.state;
                        stateEndTime = now + 2000; // Keep continuous for 2 seconds
                    }
                }
            };

            ws.onclose = () => { resetControls(); };
            ws.onerror = (err) => { resetControls(); };
        }

        function resetControls() {
            document.getElementById('btn-hw').disabled = false;
            document.getElementById('btn-sim').disabled = false;
            document.getElementById('lbl-action').innerText = "Stationary";
            const stateEl = document.getElementById('lbl-state');
            stateEl.innerText = "Awaiting...";
            stateEl.className = "card-value";
            currentCarState = "RELAXED";
            stateEndTime = 0;
        }

        // --- CANVAS GAME LOOP: CIRCULAR TRACK & DIGITAL SPEEDOMETER ---
        function updateAndRenderGame() {
            const now = performance.now();

            // Handle Physics Transitions
            if (now < stateEndTime) {
                if (currentCarState === "ATTENTIVE") {
                    velocity += (targetMaxSpeed - velocity) * 0.05;
                    carColor = varStyle('--accent-cyan');
                    carGlowColor = "rgba(0, 255, 204, 0.6)";
                } else {
                    velocity += (targetMinSpeed - velocity) * 0.08;
                    carColor = varStyle('--accent-red');
                    carGlowColor = "rgba(255, 51, 85, 0.4)";
                }
            } else {
                if (currentCarState === "ATTENTIVE") {
                    velocity += (targetMaxSpeed - velocity) * 0.01;
                } else {
                    velocity *= 0.95;
                }
            }

            // Translate velocity into angular orbital steps around the circle
            carAngle += (velocity * 0.0015);

            const centerX = trackCanvas.width / 2;
            const centerY = trackCanvas.height / 2;
            const trackRadius = Math.min(trackCanvas.width, trackCanvas.height) * 0.34;

            trackCtx.clearRect(0, 0, trackCanvas.width, trackCanvas.height);

            // 1. Draw Outer Glowing Ring Border Lane
            trackCtx.strokeStyle = "#22222d";
            trackCtx.lineWidth = 42;
            trackCtx.beginPath();
            trackCtx.arc(centerX, centerY, trackRadius, 0, Math.PI * 2);
            trackCtx.stroke();

            // Inner Racing Target Guideline Core
            trackCtx.strokeStyle = "rgba(255,255,255,0.06)";
            trackCtx.lineWidth = 2;
            trackCtx.setLineDash([10, 15]);
            trackCtx.beginPath();
            trackCtx.arc(centerX, centerY, trackRadius, 0, Math.PI * 2);
            trackCtx.stroke();
            trackCtx.setLineDash([]);

            // 2. INTEGRATED SPEEDOMETER GRAPHIC HUD DISPLAY
            // Arc progress ring gauge
            const speedPerc = velocity / targetMaxSpeed;
            trackCtx.strokeStyle = speedPerc > 0.5 ? varStyle('--accent-cyan') : varStyle('--accent-blue');
            trackCtx.lineWidth = 6;
            trackCtx.lineCap = "round";
            trackCtx.beginPath();
            // Render Speed Gauge Ring sweeping from bottom left around to bottom right
            trackCtx.arc(centerX, centerY, trackRadius - 40, Math.PI * 0.75, Math.PI * 0.75 + (Math.PI * 1.5 * speedPerc));
            trackCtx.stroke();

            // Digital speed string numbers output
            trackCtx.fillStyle = "#ffffff";
            trackCtx.font = "700 48px monospace";
            trackCtx.textAlign = "center";
            trackCtx.textBaseline = "middle";
            trackCtx.fillText(Math.round(velocity * 4), centerX, centerY - 10); // Scalar multiplier visual value scaling

            // Speed Units Caption Text
            trackCtx.fillStyle = varStyle('--text-muted');
            trackCtx.font = "bold 12px system-ui";
            trackCtx.fillText("COGNITIVE RAD/S", centerX, centerY + 25);

            // Mini Status Pill Inside Speedometer Dial
            trackCtx.fillStyle = currentCarState === "ATTENTIVE" ? "rgba(0, 255, 204, 0.1)" : "rgba(255, 51, 85, 0.1)";
            trackCtx.strokeStyle = currentCarState === "ATTENTIVE" ? varStyle('--accent-cyan') : varStyle('--accent-red');
            trackCtx.lineWidth = 1;
            
            const pillW = 90, pillH = 22;
            trackCtx.beginPath();
            trackCtx.roundRect(centerX - pillW/2, centerY + 45, pillW, pillH, 11);
            trackCtx.fill();
            trackCtx.stroke();

            trackCtx.fillStyle = currentCarState === "ATTENTIVE" ? varStyle('--accent-cyan') : varStyle('--accent-red');
            trackCtx.font = "bold 10px system-ui";
            trackCtx.fillText(currentCarState, centerX, centerY + 56);

            // 3. RENDER SPORT CAR GEOMETRY SILHOUETTE ON THE ORBIT CIRCLE
            const carX = centerX + Math.cos(carAngle) * trackRadius;
            const carY = centerY + Math.sin(carAngle) * trackRadius;

            trackCtx.save();
            trackCtx.translate(carX, carY);
            // Rotate the car sprite body to stay tangent to the track curve radius vector
            trackCtx.rotate(carAngle + Math.PI / 2);

            // Car chassis glow blur
            trackCtx.shadowBlur = 20;
            trackCtx.shadowColor = carGlowColor;

            // Main Aero Formula Body Pod
            trackCtx.fillStyle = carColor;
            const cw = 22, ch = 42;
            trackCtx.beginPath();
            trackCtx.roundRect(-cw/2, -ch/2, cw, ch, 6);
            trackCtx.fill();

            trackCtx.shadowBlur = 0; // Disable blur overhead computation layers

            // Racing Spoiler Deck Elements
            trackCtx.fillStyle = "#09090b";
            trackCtx.fillRect(-cw/2 - 4, ch/2 - 6, cw + 8, 5); // Rear Wing
            trackCtx.fillRect(-cw/2 - 2, -ch/2 + 2, cw + 4, 3); // Front Splitter

            // Tires
            trackCtx.fillStyle = "#000000";
            trackCtx.fillRect(-cw/2 - 3, -ch/2 + 6, 3, 8); // FL
            trackCtx.fillRect(cw/2, -ch/2 + 6, 3, 8);  // FR
            trackCtx.fillRect(-cw/2 - 4, ch/2 - 14, 4, 10); // RL
            trackCtx.fillRect(cw/2, ch/2 - 14, 4, 10);  // RR

            // Dark glass canopy cockpit window area
            trackCtx.fillStyle = "#0e1726";
            trackCtx.beginPath();
            trackCtx.arc(0, -4, 5, 0, Math.PI * 2);
            trackCtx.fill();

            // Emoji Character Visual Alignment Anchor Center Layer
            trackCtx.font = "16px Arial";
            trackCtx.fillText("🏎️", 0, 2);

            trackCtx.restore();
        }

        // --- SMOOTH DATA OSCILLOSCOPE TRACING ---
        function drawChart() {
            chartCtx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
            
            chartCtx.strokeStyle = "#22222b";
            chartCtx.lineWidth = 1;
            for(let i = 1; i < 5; i++) {
                let yLine = (chartCanvas.height / 5) * i;
                chartCtx.beginPath();
                chartCtx.moveTo(0, yLine);
                chartCtx.lineTo(chartCanvas.width, yLine);
                chartCtx.stroke();
            }

            if (eegBuffer.length < 2) return;

            chartCtx.beginPath();
            chartCtx.strokeStyle = currentCarState === "ATTENTIVE" ? varStyle('--accent-cyan') : varStyle('--accent-blue');
            chartCtx.lineWidth = 2.5;
            chartCtx.lineCap = "round";
            chartCtx.lineJoin = "round";

            for (let i = 0; i < eegBuffer.length; i++) {
                const x = (chartCanvas.width / (maxDataPoints - 1)) * i;
                const y = chartCanvas.height - ((eegBuffer[i] / 1023) * chartCanvas.height);

                if (i === 0) chartCtx.moveTo(x, y);
                else chartCtx.lineTo(x, y);
            }
            chartCtx.stroke();
        }

        function masterSyncLoop() {
            updateAndRenderGame();
            drawChart();
            requestAnimationFrame(masterSyncLoop);
        }
        masterSyncLoop();
    </script>
</body>
</html>
