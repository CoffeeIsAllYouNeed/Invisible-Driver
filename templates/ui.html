<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EEG Car Racing Controls Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e24;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Side: Car Racing Track Layout */
        #track-container {
            width: 40%;
            background: #1a1a1c;
            border-right: 5px dashed #ffd700;
            position: relative;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        #trackCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Right Side: Configuration Control Panel */
        #control-panel {
            width: 60%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background: #282830;
            box-sizing: border-box;
            gap: 15px;
        }

        h2 { color: #00ffcc; border-bottom: 2px solid #444; padding-bottom: 10px; margin-top: 0; }

        .btn-group { display: flex; gap: 20px; margin: 10px 0; }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
        }

        .btn-hardware { background: #e67e22; }
        .btn-hardware:hover { background: #d35400; box-shadow: 0 0 10px rgba(230,126,34,0.5); }

        .btn-simulation { background: #3498db; }
        .btn-simulation:hover { background: #2980b9; box-shadow: 0 0 10px rgba(52,152,219,0.5); }

        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        #metrics-display {
            background: #1a1a1f;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #00ffcc;
        }

        .metric { font-size: 18px; margin: 10px 0; }
        .highlight { font-weight: bold; color: #ffd700; }

        /* Modernized Signal Trace Window Viewport */
        .chart-window {
            flex: 1;
            background: #111115;
            border-radius: 8px;
            border: 1px solid #3c3c44;
            position: relative;
            min-height: 200px;
            overflow: hidden;
            margin-top: 10px;
        }
        #chartCanvas { width: 100%; height: 100%; display: block; }
        .chart-label {
            position: absolute;
            top: 12px;
            left: 15px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #8a8a93;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="track-container">
        <canvas id="trackCanvas"></canvas>
    </div>

    <div id="control-panel">
        <h2>EEG Focus Engine Racing Interface</h2>
        <p style="margin: 0; color: #b0b0bc;">Select your data pipeline ingestion configuration protocol below to initialize tracking:</p>
        
        <div class="btn-group">
            <button class="btn-hardware" id="btn-hw" onclick="startStream('serial')">(a) Testing Using Hardware</button>
            <button class="btn-simulation" id="btn-sim" onclick="startStream('file')">(b) Run Live Simulation File</button>
        </div>

        <div id="metrics-display">
            <h3 style="margin-top: 0; color: #00ffcc;">Live Telemetry Status</h3>
            <div class="metric">Current Mental State: <span id="lbl-state" class="highlight">Awaiting Stream...</span></div>
            <div class="metric">Car Engine Vector: <span id="lbl-action" class="highlight">Stationary</span></div>
            <div class="metric">Pipeline Raw Value: <span id="lbl-signal" class="highlight">---</span></div>
        </div>

        <div class="chart-window">
            <div class="chart-label">Live Raw EEG Trace (Normalized Metrics Vector)</div>
            <canvas id="chartCanvas"></canvas>
        </div>
    </div>

    <script>
        // Setup Canvas elements
        const trackCanvas = document.getElementById("trackCanvas");
        const trackCtx = trackCanvas.getContext("2d");
        const chartCanvas = document.getElementById("chartCanvas");
        const chartCtx = chartCanvas.getContext("2d");

        let ws = null;

        // --- RIGID TIME-WINDOW PHYSICS CONTROLLER ---
        let currentCarState = "RELAXED";
        let stateEndTime = 0; // Epoch timeline anchor for 2-second overrides
        
        let velocity = 0;
        const targetMaxSpeed = 16;
        const targetMinSpeed = 0;
        let roadScrollPosition = 0;

        // Car visual properties
        let carColor = "#ff3333";
        let carGlowRadius = 15;
        let carGlowColor = "rgba(255, 51, 51, 0.8)";

        // --- LIVE SIGNAL MEMORY WINDOW ---
        let eegBuffer = [];
        const maxDataPoints = 180; // Optimal width allocation balance

        // Window Resizer Event Listener to keep coordinate mapping matrices flawless
        function resizeCanvases() {
            trackCanvas.width = trackCanvas.parentElement.clientWidth;
            trackCanvas.height = trackCanvas.parentElement.clientHeight;
            chartCanvas.width = chartCanvas.parentElement.clientWidth;
            chartCanvas.height = chartCanvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();

        function startStream(modeSelection) {
            document.getElementById('btn-hw').disabled = true;
            document.getElementById('btn-sim').disabled = true;
            document.getElementById('lbl-state').innerText = "Initializing Stream Architecture...";
            
            eegBuffer = [];
            stateEndTime = 0;
            currentCarState = "RELAXED";

            ws = new WebSocket(`ws://${window.location.host}/pipeline_stream`);

            ws.onopen = function() {
                console.log("WebSocket connected.");
                ws.send(JSON.stringify({ "command": "START", "mode": modeSelection }));
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.status === "complete") {
                    document.getElementById('lbl-state').innerText = "Stream Completed.";
                    resetControls();
                    return;
                }

                // 1. Log Raw Stream metrics
                document.getElementById('lbl-state').innerText = data.state;
                document.getElementById('lbl-action').innerText = data.action;
                document.getElementById('lbl-signal').innerText = data.signal ? Number(data.signal).toFixed(2) : "---";

                // 2. Accumulate Signal Trace Arrays 
                if (data.signal !== undefined) {
                    eegBuffer.push(Number(data.signal));
                    if (eegBuffer.length > maxDataPoints) eegBuffer.shift();
                }

                // 3. Evaluate 2-Second State Window Timing 
                if (data.state) {
                    const now = performance.now();
                    if (data.state !== currentCarState) {
                        currentCarState = data.state;
                        stateEndTime = now + 2000; // Force-lock state context trajectory window for 2.0 seconds
                    }
                }
            };

            ws.onclose = () => { resetControls(); };
            ws.onerror = (err) => { console.error(err); resetControls(); };
        }

        function resetControls() {
            document.getElementById('btn-hw').disabled = false;
            document.getElementById('btn-sim').disabled = false;
            document.getElementById('lbl-action').innerText = "Stationary";
            document.getElementById('lbl-state').innerText = "Awaiting Stream...";
            currentCarState = "RELAXED";
            stateEndTime = 0;
        }

        // --- CORE GAME ARCHITECTURE INTERPOLATION ENGINE ---
        function updateAndRenderGame() {
            const now = performance.now();

            // Calculate the color scheme adjustments and current vector states based on active state window
            if (now < stateEndTime) {
                if (currentCarState === "ATTENTIVE") {
                    velocity += (targetMaxSpeed - velocity) * 0.04; // Smooth asset acceleration
                    carColor = "#00ffcc";
                    carGlowColor = "rgba(0, 255, 204, 0.9)";
                    carGlowRadius = 25;
                } else {
                    velocity += (targetMinSpeed - velocity) * 0.06; // Active engine brake deceleration
                    carColor = "#ff3333";
                    carGlowColor = "rgba(255, 51, 51, 0.8)";
                    carGlowRadius = 15;
                }
            } else {
                // Decay curves when stream packets are delayed or absent
                if (currentCarState === "ATTENTIVE") {
                    velocity += (targetMaxSpeed - velocity) * 0.01;
                } else {
                    velocity *= 0.96;
                }
            }

            roadScrollPosition += velocity * 1.5;

            // Clear road window viewport
            trackCtx.clearRect(0, 0, trackCanvas.width, trackCanvas.height);

            // Draw Road surface base
            trackCtx.fillStyle = "#222226";
            trackCtx.fillRect(0, 0, trackCanvas.width, trackCanvas.height);

            // Draw scrolling dash markers array matching velocity
            trackCtx.strokeStyle = "#ffffff";
            trackCtx.lineWidth = 4;
            trackCtx.setLineDash([35, 45]);
            trackCtx.lineDashOffset = -roadScrollPosition;

            trackCtx.beginPath();
            trackCtx.moveTo(trackCanvas.width / 2, 0);
            trackCtx.lineTo(trackCanvas.width / 2, trackCanvas.height);
            trackCtx.stroke();
            trackCtx.setLineDash([]); // Reset line configurations style matrix

            // Render Professional F1 Sprite geometry silhouette configurations
            const carW = 54;
            const carH = 95;
            const carX = (trackCanvas.width / 2) - (carW / 2);
            // Lock car vertically at standard placement baseline
            const carY = trackCanvas.height - 150; 

            // Glow aura profile shadowing effect layers
            trackCtx.shadowBlur = carGlowRadius;
            trackCtx.shadowColor = carGlowColor;

            // Main Aero Shell Chassis
            trackCtx.fillStyle = carColor;
            trackCtx.fillRect(carX, carY, carW, carH - 12);

            trackCtx.shadowBlur = 0; // Turn off visual processing blur shadows for interior modules

            // Side pods structure
            trackCtx.fillStyle = "#111";
            trackCtx.fillRect(carX - 4, carY + 30, 4, 35);
            trackCtx.fillRect(carX + carW, carY + 30, 4, 35);

            // Performance rear deck wing asset
            trackCtx.fillStyle = "#0a0a0c";
            trackCtx.fillRect(carX - 8, carY + carH - 15, carW + 16, 12);

            // Deep tint canopy glass windshield cockpit area
            trackCtx.fillStyle = "#090d16";
            trackCtx.fillRect(carX + 11, carY + 28, carW - 22, 28);

            // Decorative stripe aesthetics
            trackCtx.fillStyle = "#ffffff";
            trackCtx.fillRect(carX + 16, carY, 4, 20);
            trackCtx.fillRect(carX + carW - 20, carY, 4, 20);

            // Render Text Emoji Overlay on top center
            trackCtx.fillStyle = "#ffffff";
            trackCtx.font = "bold 28px Segoe UI";
            trackCtx.textAlign = "center";
            trackCtx.fillText("🏎️", trackCanvas.width / 2, carY + 42);
        }

        // --- SMOOTH DATA OSCILLOSCOPE TRACING ---
        function drawChart() {
            chartCtx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
            
            // Subdued baseline matrix grids
            chartCtx.strokeStyle = "#1e1e26";
            chartCtx.lineWidth = 1;
            for(let i = 1; i < 5; i++) {
                let yLine = (chartCanvas.height / 5) * i;
                chartCtx.beginPath();
                chartCtx.moveTo(0, yLine);
                chartCtx.lineTo(chartCanvas.width, yLine);
                chartCtx.stroke();
            }

            if (eegBuffer.length < 2) return;

            // Build smooth spline graph tracking trail path lines
            chartCtx.beginPath();
            chartCtx.strokeStyle = currentCarState === "ATTENTIVE" ? "#00ffcc" : "#3498db";
            chartCtx.lineWidth = 2.5;
            chartCtx.lineCap = "round";
            chartCtx.lineJoin = "round";

            for (let i = 0; i < eegBuffer.length; i++) {
                const x = (chartCanvas.width / (maxDataPoints - 1)) * i;
                // Auto normalize 10-bit dynamic array value windows down to pixel bounds safely
                const y = chartCanvas.height - ((eegBuffer[i] / 1023) * chartCanvas.height);

                if (i === 0) chartCtx.moveTo(x, y);
                else chartCtx.lineTo(x, y);
            }
            chartCtx.stroke();
        }

        // Dedicated Animation Frame Master Coordination Thread Loop
        function masterSyncLoop() {
            updateAndRenderGame();
            drawChart();
            requestAnimationFrame(masterSyncLoop);
        }
        masterSyncLoop();
    </script>
</body>
</html>
